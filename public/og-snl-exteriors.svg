<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">S and L Exteriors - Roofing, Siding, and Painting</title>
  <desc id="desc">Social preview card for S and L Exteriors website.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1E36"/>
      <stop offset="1" stop-color="#1F4E79"/>
    </linearGradient>
    <linearGradient id="accent" x1="245" y1="290" x2="1000" y2="530" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0.28"/>
    </linearGradient>
    <filter id="glow" x="120" y="220" width="980" height="320" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <g filter="url(#glow)">
    <ellipse cx="620" cy="390" rx="390" ry="88" fill="url(#accent)"/>
  </g>

  <rect x="88" y="72" width="1024" height="486" rx="34" fill="#FFFFFF" fill-opacity="0.06" stroke="#FFFFFF" stroke-opacity="0.15"/>

  <text x="146" y="208" fill="#F8FAFC" font-size="78" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">
    S and L Exteriors
  </text>
  <text x="146" y="270" fill="#BFDBFE" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="500">
    Roofing • Siding • Exterior &amp; Interior Painting
  </text>

  <g>
    <rect x="146" y="326" width="340" height="66" rx="14" fill="#22C55E" fill-opacity="0.2"/>
    <text x="178" y="370" fill="#DCFCE7" font-size="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600">
      Free Inspections
    </text>
  </g>

  <g>
    <rect x="510" y="326" width="550" height="66" rx="14" fill="#38BDF8" fill-opacity="0.2"/>
    <text x="542" y="370" fill="#E0F2FE" font-size="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600">
      Hinckley, IL &amp; Surrounding Areas
    </text>
  </g>

  <text x="146" y="470" fill="#E2E8F0" font-size="28" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="500">
    Handled directly by owner Ryan Salazar
  </text>
</svg>
